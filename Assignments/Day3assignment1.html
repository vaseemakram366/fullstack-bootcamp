<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f3f3;
}

.calculator{
    width:95%;
    max-width:430px;
    background:#f7f7f7;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.1);
}

.display{
    width:100%;
    height:80px;
    background:white;
    border-radius:12px;
    margin-bottom:25px;
    box-shadow:0px 3px 8px rgba(0,0,0,0.08);
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

button{
    height:75px;
    border:none;
    border-radius:12px;
    background:white;
    font-size:22px;
    font-weight:bold;
    box-shadow:0px 3px 8px rgba(0,0,0,0.08);
}

.operator{
    background:black;
    color:white;
}

.clear{
    background:red;
    color:white;
}

</style>
</head>

<body>

<div class="calculator">

    <div class="display"></div>

    <div class="buttons">

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">-</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">*</button>

        <button class="clear">C</button>
        <button>0</button>
        <button class="operator">=</button>
        <button class="operator">/</button>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Keyboard Layout</title>

    <style>

        body{
            background:#f5f5f5;
            font-family:Times New Roman;
        }

        h1{
            text-align:center;
        }

        .container{
            width:90%;
            margin:auto;
            padding:20px;
            border:1px solid lightgray;
            border-radius:10px;
        }

        .keyboard{
            display:grid;
            grid-template-columns:repeat(12,1fr);
            gap:10px;
        }

        .key{
            height:70px;
            background:#eeeeee;
            border-radius:12px;
            text-align:center;
            line-height:70px;
            font-size:20px;
            box-shadow:2px 2px 8px lightgray;
        }

        .enter{
            grid-column:span 2;
        }

        .shift{
            grid-column:span 2;
        }

        .space{
            grid-column:span 4;
        }

    </style>

</head>
<body>

<h1>CT Calculator Task</h1>

<div class="container">

<div class="keyboard">

<div class="key">~</div>
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
<div class="key">0</div>
<div class="key">Delete</div>

<div class="key">Tab</div>
<div class="key">Q</div>
<div class="key">W</div>
<div class="key">E</div>
<div class="key">R</div>
<div class="key">T</div>
<div class="key">Y</div>
<div class="key">U</div>
<div class="key">I</div>
<div class="key">O</div>
<div class="key">P</div>
<div class="key">\</div>

<div class="key">Caps</div>
<div class="key">A</div>
<div class="key">S</div>
<div class="key">D</div>
<div class="key">F</div>
<div class="key">G</div>
<div class="key">H</div>
<div class="key">J</div>
<div class="key">K</div>
<div class="key">L</div>
<div class="key enter">Enter</div>

<div class="key">Shift</div>
<div class="key">Z</div>
<div class="key">X</div>
<div class="key">C</div>
<div class="key">V</div>
<div class="key">B</div>
<div class="key">N</div>
<div class="key">M</div>
<div class="key"><</div>
<div class="key">></div>
<div class="key shift">Shift</div>

<div class="key">Windows</div>
<div class="key">Ctrl</div>
<div class="key">Options</div>
<div class="key">Alt</div>
<div class="key space">Space</div>
<div class="key">Alt</div>
<div class="key">Option</div>
<div class="key"><</div>
<div class="key">></div>

</div>

</div>

</body>
</html>

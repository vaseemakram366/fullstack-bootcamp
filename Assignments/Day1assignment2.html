<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Event Registration</title>
</head>
<body>

    <h1>College Event Registration 📝</h1>

    <form>

        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age">
        <br><br>

        <label>Select Event Category:</label>
        <br><br>

        <input type="checkbox" id="coding">
        <label for="coding">Coding Hackathon 💻</label>
        <br>

        <input type="checkbox" id="debate">
        <label for="debate">Debate Competition 🎤</label>
        <br>

        <input type="checkbox" id="sports">
        <label for="sports">Sports Tournament ⚽</label>
        <br><br>

        <label for="date">Event Date:</label>
        <input type="date" id="date" name="date">
        <br><br>

        <label for="time">Preferred Time Slot:</label>
        <input type="time" id="time" name="time">
        <br><br>

        <input type="submit" value="Register Now">

    </form>

</body>
</html>

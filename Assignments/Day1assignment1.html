<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Schedule</title>
</head>
<body>

    <h1 align="center">Weekly Schedule</h1>

    <table border="1" cellspacing="0" cellpadding="15" align="center">
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>

        <tr>
            <td rowspan="2">Morning</td>
            <td>Math</td>
            <td rowspan="2">Science Lab</td>
            <td rowspan="2"></td>
            <td>History</td>
            <td>English</td>
        </tr>

        <tr>
            <td>Physics</td>
            <td>Geography</td>
            <td>Sports</td>
        </tr>

        <tr>
            <td>Afternoon</td>
            <td colspan="5">Lunch Break</td>
        </tr>

        <tr>
            <td>Evening</td>
            <td>Computer Science</td>
            <td>Art</td>
            <td rowspan="2">Music</td>
            <td>Drama</td>
            <td>Free Period</td>
        </tr>

        <tr>
            <td>Late Evening</td>
            <td colspan="2">Self Study</td>
            <td>Debate</td>
            <td>Sports</td>
        </tr>
    </table>

</body>
</html>

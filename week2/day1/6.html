<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply css/ style to html elemet</title>
</head>
<body>
    <h1 id="head">Hello world</h1>
</body>
</html>
<script>
    // step-1 catch/select
    const el = document.getElementById("head");

    // step-2 apply css

    el.style.color = "teal";
    el.style.backgroundColor = "pink"
    el.style.fontSize = "40px"
</script>

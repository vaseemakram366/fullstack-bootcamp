<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naptol</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background-color: #f5f7fa;
    padding: 20px;
}

h1 {
    text-align: center;
    margin: 25px 0;
    color: #222;
}

input,
select {
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin: 10px;
    font-size: 16px;
}

#search {
    width: 300px;
}

#root {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

#root > div {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

#root > div:hover {
    transform: translateY(-8px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

img {
    width: 100%;
    height: 260px;
    object-fit: contain;
    padding: 15px;
    background: white;
}

h3 {
    padding: 0 15px;
    margin: 10px 0;
    color: #222;
    font-size: 16px;
}

p {
    padding: 0 15px;
    color: #666;
    font-size: 14px;
    line-height: 1.5;
    height: 90px;
    overflow: hidden;
}

button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    margin: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

button:nth-child(5) {
    background: #22c55e;
    color: white;
}

button:nth-child(6) {
    background: #f59e0b;
    color: white;
}

button:last-child {
    background: #2563eb;
    color: white;
    width: calc(100% - 30px);
    margin: 15px;
}

button:last-child:hover {
    background: #1d4ed8;
}

hr {
    border: none;
    border-top: 1px solid #eee;
    margin-top: 10px;
}

#total {
    text-align: center;
    margin-bottom: 25px;
    color: #2563eb;
    font-size: 30px;
}

span {
    color: #2563eb;
    font-weight: bold;
}

@media (max-width: 768px) {
    #search {
        width: 90%;
    }

    #root {
        grid-template-columns: 1fr;
    }
}

<body>
    <h1>Welcome to Naptol Product Page</h1>

    <input type="text" id="search" placeholder="search Product ..." oninput="search()">

    <select id="sort" onchange="sort()">
        <option value="asc">asc</option>
        <option value="dsc">dsc</option>
    </select>

    <div id="root">
        <!-- All Product come here... -->
    </div>
</body>

</html>

<script>

    let bag = []
    let cartArr = JSON.parse(localStorage.getItem("cart")) || []
    const api = "https://fakestoreapi.com/products";

    fetch(api)
        .then((res) => res.json())
        .then((data) => {
            console.log(data)
            bag = data
            displayCart(data);
        }
        ).catch((err) => console.log(err)
        )


    function displayCart(arr) {
        document.querySelector("#root").innerText = ""
        arr.forEach((el) => {

            const box = document.createElement("div");

            const image = document.createElement("img");
            image.setAttribute("src", el.image);

            const title = document.createElement("h3");
            title.innerText = `Title: ${el.title}`

            const category = document.createElement("h3");
            category.innerText = `Category: ${el.category}`

            const description = document.createElement("p");
            description.innerText = `Description: ${el.description}`

            const price = document.createElement("button");
            price.innerText = `Price: ${el.price}`

            const rating = document.createElement("button");
            rating.innerText = `Rating: ${el.rating.rate}`

            const hrr = document.createElement("hr");

            const cart = document.createElement("button");
            cart.innerText = "Add to Cart"

            cart.addEventListener("click", function () {
                cartArr.push(el);

                localStorage.setItem("cart", JSON.stringify(cartArr));
                // alert("Product added to cart")
                Swal.fire({
                    title: "Good job!",
                    text: "Product added to cart",
                    icon: "success"
                });
            })

            box.append(image, title, category, description, price, rating, hrr, cart);

            document.querySelector("#root").append(box)
        })
    }

    function search() {
        console.log(bag);

        const query = document.querySelector("#search").value

        const filterData = bag.filter((el) => {
            return el.category.toLowerCase().includes(query.toLowerCase())
        });

        console.log(filterData);

        displayCart(filterData)


    }


    function sort() {
        const query = document.querySelector("#sort").value

        if (query == "asc") {
            const ans = bag.sort((a, b) => a.price - b.price);
            displayCart(ans)
        } else {
            const ans = bag.sort((b, a) => a.price - b.price);
            displayCart(ans)
        }

    }
</script>

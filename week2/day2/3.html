<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms in js</title>
</head>
<body>
    <form action="">
    <input type="text" id="em" placeholder="Enter email">
    <input type="text" id="pp" placeholder="Enter password">

    <input type="submit">

    <!-- <button>click</button> -->
    </form>
</body>
</html>
<script>
    document.querySelector("form").addEventListener("submit",getdata)
    function getdata(e) {
        e.preventDefault()
        const em = document.querySelector("#em").value;
        const pp = document.querySelector("#pp");

        console.log(em, pp);
        
    }
</script>
<!--
// 1. wrap all input tag inside form tag
// 2. use type=submit for creating button
// 3. always apply submit event in case of form
// 4. use e.preventDefault()
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        h3{
            background-color: yellow;
        }
        #para2{
            color: red;
        }

        .w1{
            text-decoration: underline;
        }
        div,p,#para2{
            border: 1px solid teal;
        }
        *{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
    </style>
</head>
<body>
    <div>I am box 1</div>
    <h1>hello form heading 1</h1>
    <h3 id="para2">hello from heading 2</h3>
    <h3 class="w1">hello from heading 3</h3>
    <p>hello from heading 1</p>
    <div>
        <span>hello</span>
    </div>
</body>
</html>

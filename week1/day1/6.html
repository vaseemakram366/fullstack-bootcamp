<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
    <form action="">
        <label for="name">Name:</label>
        <input type="text" name="" id="name" placeholder="Enter your name" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" name="" id="email" placeholder="Enter your email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" name="" id="password" placeholder="Enter your password" required>
        <br><br>

        <label for="Age">Age:</label>
        <input type="number" name="" id="password" placeholder="Enter your age" required>
        <br><br>

        <label for="dob">Dob:</label>
        <input type="date" name="" id="dob" placeholder="dd-mm-yyyy" required>
        <br><br>

        


        <label for="Gender">Gender:</label>
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>


        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>


        <br><br>

        <!-- <label for=""></label> -->

        <button>Submit</button>
        <button>Reset</button>
        
        
    </form>
</body>
</html>

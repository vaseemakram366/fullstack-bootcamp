<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        #relative {
            position: relative;
            top: 1px;
            left: 50px;
            background: red;
        }
        #fixed {
            position: relative;
            top: 1px;
            left: 50px;
            background: yellow;
        }
    </style>
</head>
<body>
    <div class="cont">
        <div id="static">Static Position</div>
        <div id="relative"> Relative position </div>
        <div id="absolute">  Absolute position</div>
        <div id="fixed"> Fixed position</div>
        <div>sticky position</div>
    </div>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>

<style>
    body{
        background-color:#f0f0f0;
        font-family:"Times New Roman", serif;
        padding:10px;
    }

    h1{
        font-size:70px;
        margin-bottom:50px;
    }

    p{
        font-size:50px;
        margin:40px 0;
    }

    input{
        width:420px;
        height:50px;
        font-size:30px;
        padding-left:10px;
    }

    button{
        font-size:30px;
        padding:5px 20px;
        margin-top:5px;
        cursor:pointer;
    }

    #result{
        font-size:50px;
        margin-top:40px;
    }
</style>
</head>
<body>

<h1>Check your BMI</h1>

<p>Enter your weight and height below to check your BMI results</p>

<p>Put your weight in here (KG)</p>
<input type="number" id="weight">

<p>And your height in here (M)</p>
<input type="number" step="0.01" id="height">

<br>

<button onclick="calculateBMI()">Calculate BMI</button>

<p id="result"></p>

<script>
function calculateBMI(){

    let weight = parseFloat(document.getElementById("weight").value);
    let height = parseFloat(document.getElementById("height").value);

    if(weight <= 0 || height <= 0){
        document.getElementById("result").innerText =
        "Please enter valid values";
        return;
    }

    let bmi = weight / (height * height);

    let category = "";

    if(bmi <= 18.4){
        category = "Underweight";
    }
    else if(bmi >= 18.5 && bmi <= 24.9){
        category = "Normal Weight";
    }
    else if(bmi >= 25 && bmi <= 29.9){
        category = "Overweight";
    }
    else{
        category = "Obese";
    }

    document.getElementById("result").innerText =
    `Your BMI is ${bmi.toFixed(1)} which means You are ${category}`;
}
</script>

</body>
</html>
